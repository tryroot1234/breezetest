config:
  base_url: "https://example.com"
  browser: chromium
  headless: true
  timeout: 10000

tests:
  - name: "Page loads"
    tags: [smoke]
    steps:
      - action: goto
        value: "/"
      - action: assert_visible
        selector: "h1"

  - name: "Has title"
    tags: [smoke]
    steps:
      - action: goto
        value: "/"
      - action: assert_title
        value: "Example Domain"
